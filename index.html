<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Creative Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />

  <style>
    :root {
      --burgundy: #541431;
      --magenta: #A02F62;
      --lavender: #9072A0;
      --plum: #7A3870;
      --indigo: #584585;
      --sand: #CDBD8F;
      --sage: #849F76;
      --slate: #758FA8;
      --bg: #1a0a12;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background:
        linear-gradient(
          rgba(26,10,18,0.55),
          rgba(26,10,18,0.55)
        ),
        url("images/artwork/background.gif");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;

      color: var(--sand);
      font-family: 'Crimson Pro', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;

      background: linear-gradient(
        90deg,
        var(--burgundy) 0%,
        var(--plum) 50%,
        var(--indigo) 100%
      );

      border-bottom: 2px solid var(--magenta);

      display: flex;
      align-items: center;
      justify-content: space-between;

      padding: 0 2.5rem;
      height: 64px;

      box-shadow: 0 4px 24px rgba(160,47,98,0.4);
    }

    .nav-logo {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.15rem;
      color: var(--sand);
      letter-spacing: 0.12em;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 0.4rem;
      list-style: none;
    }

    .nav-links a {
      display: block;
      padding: 0.45rem 1.1rem;
      border-radius: 4px;

      font-family: 'Cinzel Decorative', serif;
      font-size: 0.72rem;
      letter-spacing: 0.08em;

      color: var(--sand);
      text-decoration: none;

      border: 1px solid transparent;

      transition:
        background 0.2s,
        border-color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      background: rgba(205,189,143,0.12);
      border-color: var(--sand);
      color: #fff;
    }

    #bird-canvas {
      position: fixed;
      top: 0;
      left: 0;

      width: 100%;
      height: 100%;

      pointer-events: none;

      z-index: 1;

      image-rendering: pixelated;
    }

    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;

      background:
        radial-gradient(
          ellipse at 20% 30%,
          rgba(84,20,49,0.6) 0%,
          transparent 55%
        ),

        radial-gradient(
          ellipse at 80% 70%,
          rgba(88,69,133,0.5) 0%,
          transparent 50%
        ),

        radial-gradient(
          ellipse at 50% 50%,
          rgba(122,56,112,0.3) 0%,
          transparent 70%
        );
    }

    .hero {
      min-height: 100vh;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      text-align: center;

      padding: 120px 2rem 4rem;

      position: relative;
      z-index: 2;
    }

    .hero-title {
      font-family: 'Cinzel Decorative', serif;

      font-size: clamp(2rem,6vw,4.5rem);
      font-weight: 700;
      line-height: 1.15;

      background: linear-gradient(
        135deg,
        var(--sand) 0%,
        var(--lavender) 50%,
        var(--sage) 100%
      );

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;

      margin-bottom: 1rem;

      filter: drop-shadow(
        0 0 30px rgba(144,114,160,0.5)
      );
    }

    .hero-sub {
      font-size: 1.25rem;
      font-style: italic;
      color: var(--lavender);

      margin-bottom: 3rem;

      letter-spacing: 0.05em;
    }

    .hero-cards {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;

      margin-top: 1rem;
    }

    .hero-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;

      padding: 2rem 2.2rem;

      border-radius: 12px;

      background: rgba(84,20,49,0.45);

      border: 1px solid var(--magenta);

      backdrop-filter: blur(8px);

      text-decoration: none;
      color: var(--sand);

      transition:
        transform 0.25s,
        box-shadow 0.25s,
        background 0.25s;

      width: 190px;
    }

    .hero-card:hover {
      transform: translateY(-6px);

      box-shadow:
        0 12px 40px rgba(160,47,98,0.45);

      background: rgba(122,56,112,0.55);
    }

    .hero-card .card-icon {
      font-size: 2.5rem;
      line-height: 1;
    }

    .hero-card .card-label {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-align: center;
    }

    .hero-card .card-desc {
      font-size: 0.85rem;
      font-style: italic;
      color: var(--lavender);
      text-align: center;
    }

    footer {
      position: relative;
      z-index: 2;

      text-align: center;

      padding: 2rem;

      font-size: 0.8rem;
      color: var(--plum);

      border-top: 1px solid rgba(122,56,112,0.3);
    }
  </style>
</head>

<body>

  <div class="bg-gradient"></div>

  <canvas id="bird-canvas"></canvas>

  <nav>
    <a class="nav-logo" href="index.html">
      ✦ My Portfolio
    </a>

    <ul class="nav-links">
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="artwork.html">Artwork</a></li>
      <li><a href="music.html">Music</a></li>
      <li><a href="animations.html">Animations</a></li>
    </ul>
  </nav>

  <main class="hero">

    <h1 class="hero-title" id="site-title">
      My Creative World
    </h1>

    <p class="hero-sub" id="site-subtitle">
      Art · Music · Animation
    </p>

    <div class="hero-cards">

      <a class="hero-card" href="artwork.html">
        <span class="card-icon">🎨</span>
        <span class="card-label">Artwork</span>
        <span class="card-desc">
          Original pieces & illustrated works
        </span>
      </a>

      <a class="hero-card" href="music.html">
        <span class="card-icon">🎵</span>
        <span class="card-label">Music</span>
        <span class="card-desc">
          Songs & sounds tied to the art
        </span>
      </a>

      <a class="hero-card" href="animations.html">
        <span class="card-icon">✨</span>
        <span class="card-label">Animations</span>
        <span class="card-desc">
          Animated gifs & motion work
        </span>
      </a>

    </div>

  </main>

  <footer>
    <p>✦ All content belongs to me ✦</p>
  </footer>

</body>
</html>
