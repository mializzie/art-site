<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animations – My Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    :root{--burgundy:#541431;--magenta:#A02F62;--lavender:#9072A0;--plum:#7A3870;--indigo:#584585;--sand:#CDBD8F;--sage:#849F76;--slate:#758FA8;--bg:#1a0a12;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--sand);font-family:'Crimson Pro',serif;min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse at 50% 0%,rgba(117,143,168,0.3) 0%,transparent 50%),
                 radial-gradient(ellipse at 20% 100%,rgba(84,20,49,0.4) 0%,transparent 50%);}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;
      background:linear-gradient(90deg,var(--burgundy) 0%,var(--plum) 50%,var(--indigo) 100%);
      border-bottom:2px solid var(--magenta);display:flex;align-items:center;justify-content:space-between;
      padding:0 2.5rem;height:64px;box-shadow:0 4px 24px rgba(160,47,98,0.4);}
    .nav-logo{font-family:'Cinzel Decorative',serif;font-size:1.15rem;color:var(--sand);letter-spacing:0.12em;text-decoration:none;}
    .nav-links{display:flex;gap:0.4rem;list-style:none;}
    .nav-links a{display:block;padding:0.45rem 1.1rem;border-radius:4px;font-family:'Cinzel Decorative',serif;
      font-size:0.72rem;letter-spacing:0.08em;color:var(--sand);text-decoration:none;
      border:1px solid transparent;transition:background 0.2s,border-color 0.2s;}
    .nav-links a:hover,.nav-links a.active{background:rgba(205,189,143,0.12);border-color:var(--sand);color:#fff;}

    .page{position:relative;z-index:1;padding:100px 2rem 4rem;max-width:1100px;margin:0 auto;}
    .page-title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.6rem,4vw,2.8rem);
      background:linear-gradient(135deg,var(--sand),var(--slate));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.4rem;}
    .page-sub{font-style:italic;color:var(--slate);margin-bottom:3rem;font-size:1.05rem;}

    .state-msg{color:var(--lavender);font-style:italic;padding:2rem 0;}

    .gif-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.8rem;}

    .gif-card{background:rgba(88,69,133,0.2);border:1px solid var(--indigo);border-radius:12px;overflow:hidden;
      cursor:pointer;transition:transform 0.25s,box-shadow 0.25s;}
    .gif-card:hover{transform:translateY(-5px);box-shadow:0 12px 40px rgba(117,143,168,0.25);}

    .gif-wrap{width:100%;aspect-ratio:1/1;background:rgba(88,69,133,0.15);overflow:hidden;
      display:flex;align-items:center;justify-content:center;}
    .gif-wrap img{width:100%;height:100%;object-fit:contain;display:block;}
    .img-fallback{display:none;width:100%;height:100%;align-items:center;justify-content:center;
      flex-direction:column;gap:0.4rem;color:var(--slate);font-size:0.85rem;font-style:italic;text-align:center;padding:1rem;}
    .img-fallback span{font-size:2.8rem;}

    .gif-body{padding:1rem 1.2rem 1.3rem;}
    .gif-title{font-family:'Cinzel Decorative',serif;font-size:0.82rem;letter-spacing:0.07em;color:var(--sand);margin-bottom:0.4rem;}
    .gif-desc{font-size:0.9rem;color:#b8aad8;font-style:italic;line-height:1.6;}

    /* Lightbox */
    .lightbox{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.93);
      align-items:center;justify-content:center;cursor:zoom-out;}
    .lightbox.open{display:flex;}
    .lb-inner{position:relative;display:flex;flex-direction:column;align-items:center;gap:1rem;max-width:90vw;}
    .lb-inner img{max-width:90vw;max-height:78vh;object-fit:contain;border-radius:8px;
      box-shadow:0 0 60px rgba(117,143,168,0.3);cursor:default;}
    .lb-title{font-family:'Cinzel Decorative',serif;font-size:0.9rem;color:var(--sand);letter-spacing:0.08em;}
    .lb-desc{font-size:0.95rem;font-style:italic;color:var(--lavender);text-align:center;max-width:560px;}
    .lb-close{position:absolute;top:-2.5rem;right:0;font-size:1.8rem;color:var(--sand);background:none;border:none;cursor:pointer;}
    .lb-nav{display:flex;gap:1rem;}
    .lb-nav button{padding:0.4rem 1.1rem;border-radius:6px;background:rgba(117,143,168,0.12);
      border:1px solid var(--indigo);color:var(--sand);font-family:'Cinzel Decorative',serif;
      font-size:0.68rem;letter-spacing:0.06em;cursor:pointer;transition:background 0.2s;}
    .lb-nav button:hover{background:rgba(117,143,168,0.25);}

    footer{position:relative;z-index:1;text-align:center;padding:2rem;font-size:0.8rem;color:var(--plum);
      border-top:1px solid rgba(122,56,112,0.3);margin-top:3rem;}
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">✦ My Portfolio</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="artwork.html">Artwork</a></li>
    <li><a href="music.html">Music</a></li>
    <li><a href="animations.html" class="active">Animations</a></li>
  </ul>
</nav>

<main class="page">
  <h1 class="page-title">Animations</h1>
  <p class="page-sub">Animated works &amp; motion art</p>
  <div id="anim-container"><p class="state-msg">Loading…</p></div>
</main>

<footer><p>✦ All content belongs to me ✦</p></footer>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lb-inner">
    <button class="lb-close" id="lb-close">✕</button>
    <img id="lb-img" src="" alt="" />
    <div class="lb-title" id="lb-title"></div>
    <div class="lb-desc" id="lb-desc"></div>
    <div class="lb-nav">
      <button id="lb-prev">← Prev</button>
      <button id="lb-next">Next →</button>
    </div>
  </div>
</div>

<script>
let gifs = [];
let currentIdx = 0;

function openLightbox(idx) {
  currentIdx = idx;
  showItem();
  document.getElementById('lightbox').classList.add('open');
}
function showItem() {
  const g = gifs[currentIdx];
  document.getElementById('lb-img').src = g.image;
  document.getElementById('lb-img').alt = g.title || '';
  document.getElementById('lb-title').textContent = g.title || '';
  document.getElementById('lb-desc').textContent = g.description || '';
}
document.getElementById('lb-close').onclick = () => document.getElementById('lightbox').classList.remove('open');
document.getElementById('lightbox').addEventListener('click', e => { if(e.target===document.getElementById('lightbox')) document.getElementById('lightbox').classList.remove('open'); });
document.getElementById('lb-prev').onclick = e => { e.stopPropagation(); currentIdx=(currentIdx-1+gifs.length)%gifs.length; showItem(); };
document.getElementById('lb-next').onclick = e => { e.stopPropagation(); currentIdx=(currentIdx+1)%gifs.length; showItem(); };
document.addEventListener('keydown', e => {
  if(!document.getElementById('lightbox').classList.contains('open')) return;
  if(e.key==='ArrowLeft') { currentIdx=(currentIdx-1+gifs.length)%gifs.length; showItem(); }
  if(e.key==='ArrowRight') { currentIdx=(currentIdx+1)%gifs.length; showItem(); }
  if(e.key==='Escape') document.getElementById('lightbox').classList.remove('open');
});

function buildCard(g, idx) {
  const card = document.createElement('div');
  card.className = 'gif-card';
  card.setAttribute('role','button');
  card.setAttribute('tabindex','0');
  card.setAttribute('aria-label', g.title || 'View animation');
  card.onclick = () => openLightbox(idx);
  card.onkeydown = e => { if(e.key==='Enter'||e.key===' ') openLightbox(idx); };
  card.innerHTML = `
    <div class="gif-wrap">
      <img src="${g.image}" alt="${g.title||''}"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
      <div class="img-fallback"><span>🎞️</span><p>GIF not found</p></div>
    </div>
    <div class="gif-body">
      <div class="gif-title">${g.title||'Untitled'}</div>
      ${g.description ? `<div class="gif-desc">${g.description}</div>` : ''}
    </div>`;
  return card;
}

fetch('data.json')
  .then(r => { if(!r.ok) throw new Error(); return r.json(); })
  .then(data => {
    const container = document.getElementById('anim-container');
    gifs = data.animations || [];
    if(gifs.length === 0) {
      container.innerHTML = '<p class="state-msg">No animations yet — add GIF paths to <code>data.json</code> to get started.</p>';
      return;
    }
    const grid = document.createElement('div');
    grid.className = 'gif-grid';
    gifs.forEach((g, i) => grid.appendChild(buildCard(g, i)));
    container.innerHTML = '';
    container.appendChild(grid);
  })
  .catch(() => {
    document.getElementById('anim-container').innerHTML =
      '<p class="state-msg">Could not load <strong>data.json</strong>. Make sure you\'re running the site through a local server (see README.txt).</p>';
  });
</script>
</body>
</html>
