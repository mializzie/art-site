<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music – My Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    :root{--burgundy:#541431;--magenta:#A02F62;--lavender:#9072A0;--plum:#7A3870;--indigo:#584585;--sand:#CDBD8F;--sage:#849F76;--slate:#758FA8;--bg:#1a0a12;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--sand);font-family:'Crimson Pro',serif;min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse at 80% 10%,rgba(88,69,133,0.45) 0%,transparent 55%),
                 radial-gradient(ellipse at 15% 85%,rgba(84,20,49,0.45) 0%,transparent 50%);}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;
      background:linear-gradient(90deg,var(--burgundy) 0%,var(--plum) 50%,var(--indigo) 100%);
      border-bottom:2px solid var(--magenta);display:flex;align-items:center;justify-content:space-between;
      padding:0 2.5rem;height:64px;box-shadow:0 4px 24px rgba(160,47,98,0.4);}
    .nav-logo{font-family:'Cinzel Decorative',serif;font-size:1.15rem;color:var(--sand);letter-spacing:0.12em;text-decoration:none;}
    .nav-links{display:flex;gap:0.4rem;list-style:none;}
    .nav-links a{display:block;padding:0.45rem 1.1rem;border-radius:4px;font-family:'Cinzel Decorative',serif;
      font-size:0.72rem;letter-spacing:0.08em;color:var(--sand);text-decoration:none;
      border:1px solid transparent;transition:background 0.2s,border-color 0.2s;}
    .nav-links a:hover,.nav-links a.active{background:rgba(205,189,143,0.12);border-color:var(--sand);color:#fff;}

    .page{position:relative;z-index:1;padding:100px 2rem 4rem;max-width:900px;margin:0 auto;}
    .page-title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.6rem,4vw,2.8rem);
      background:linear-gradient(135deg,var(--sand),var(--sage));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.4rem;}
    .page-sub{font-style:italic;color:var(--sage);margin-bottom:3rem;font-size:1.05rem;}

    .state-msg{color:var(--lavender);font-style:italic;padding:2rem 0;}

    .music-list{display:flex;flex-direction:column;gap:2rem;}

    .music-card{background:rgba(84,20,49,0.3);border:1px solid var(--plum);border-radius:14px;overflow:hidden;
      transition:box-shadow 0.25s;}
    .music-card:hover{box-shadow:0 10px 40px rgba(132,159,118,0.2);}

    .music-header{padding:1.3rem 1.5rem 0.8rem;}
    .music-title{font-family:'Cinzel Decorative',serif;font-size:0.9rem;letter-spacing:0.07em;color:var(--sand);margin-bottom:0.35rem;}
    .music-artwork-ref{font-size:0.82rem;color:var(--sage);font-style:italic;}
    .music-desc{padding:0 1.5rem 1rem;font-size:0.95rem;color:#c4ae80;font-style:italic;line-height:1.65;}

    .yt-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-top:1px solid rgba(122,56,112,0.4);}
    .yt-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}

    footer{position:relative;z-index:1;text-align:center;padding:2rem;font-size:0.8rem;color:var(--plum);
      border-top:1px solid rgba(122,56,112,0.3);margin-top:3rem;}
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">✦ My Portfolio</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="artwork.html">Artwork</a></li>
    <li><a href="music.html" class="active">Music</a></li>
    <li><a href="animations.html">Animations</a></li>
  </ul>
</nav>

<main class="page">
  <h1 class="page-title">Music</h1>
  <p class="page-sub">Songs &amp; soundscapes tied to the artwork</p>
  <div id="music-container"><p class="state-msg">Loading…</p></div>
</main>

<footer><p>✦ All content belongs to me ✦</p></footer>

<script>
function buildCard(s) {
  const card = document.createElement('div');
  card.className = 'music-card';
  const ytUrl = `https://www.youtube.com/embed/${s.youtubeId}`;
  card.innerHTML = `
    <div class="music-header">
      <div class="music-title">${s.title || 'Untitled Track'}</div>
      ${s.relatedArtwork ? `<div class="music-artwork-ref">🎨 Related to: ${s.relatedArtwork}</div>` : ''}
    </div>
    ${s.description ? `<div class="music-desc">${s.description}</div>` : ''}
    <div class="yt-wrap">
      <iframe src="${ytUrl}" allowfullscreen loading="lazy" title="${s.title||'Music'}"></iframe>
    </div>`;
  return card;
}

fetch('data.json')
  .then(r => { if(!r.ok) throw new Error(); return r.json(); })
  .then(data => {
    const container = document.getElementById('music-container');
    const songs = data.music || [];
    if(songs.length === 0) {
      container.innerHTML = '<p class="state-msg">No music yet — add entries to <code>data.json</code> to get started.</p>';
      return;
    }
    const list = document.createElement('div');
    list.className = 'music-list';
    songs.forEach(s => list.appendChild(buildCard(s)));
    container.innerHTML = '';
    container.appendChild(list);
  })
  .catch(() => {
    document.getElementById('music-container').innerHTML =
      '<p class="state-msg">Could not load <strong>data.json</strong>. Make sure you\'re running the site through a local server (see README.txt).</p>';
  });
</script>
</body>
</html>
