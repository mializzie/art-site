<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artwork – My Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --burgundy:#541431; --magenta:#A02F62; --lavender:#9072A0;
      --plum:#7A3870; --indigo:#584585; --sand:#CDBD8F;
      --sage:#849F76; --slate:#758FA8; --bg:#1a0a12;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--sand);font-family:'Crimson Pro',serif;min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse at 10% 20%,rgba(84,20,49,0.5) 0%,transparent 50%),
                 radial-gradient(ellipse at 90% 80%,rgba(88,69,133,0.4) 0%,transparent 50%);}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;
      background:linear-gradient(90deg,var(--burgundy) 0%,var(--plum) 50%,var(--indigo) 100%);
      border-bottom:2px solid var(--magenta);display:flex;align-items:center;justify-content:space-between;
      padding:0 2.5rem;height:64px;box-shadow:0 4px 24px rgba(160,47,98,0.4);}
    .nav-logo{font-family:'Cinzel Decorative',serif;font-size:1.15rem;color:var(--sand);letter-spacing:0.12em;text-decoration:none;}
    .nav-links{display:flex;gap:0.4rem;list-style:none;}
    .nav-links a{display:block;padding:0.45rem 1.1rem;border-radius:4px;font-family:'Cinzel Decorative',serif;
      font-size:0.72rem;letter-spacing:0.08em;color:var(--sand);text-decoration:none;
      border:1px solid transparent;transition:background 0.2s,border-color 0.2s;}
    .nav-links a:hover,.nav-links a.active{background:rgba(205,189,143,0.12);border-color:var(--sand);color:#fff;}

    .page{position:relative;z-index:1;padding:100px 2rem 4rem;max-width:1200px;margin:0 auto;}
    .page-title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.6rem,4vw,2.8rem);
      background:linear-gradient(135deg,var(--sand),var(--lavender));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.4rem;}
    .page-sub{font-style:italic;color:var(--lavender);margin-bottom:3rem;font-size:1.05rem;}

    /* Loading / empty states */
    .state-msg{color:var(--lavender);font-style:italic;padding:2rem 0;font-size:1rem;}

    /* Gallery grid */
    .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:2rem;}

    .art-card{background:rgba(84,20,49,0.3);border:1px solid var(--plum);border-radius:12px;overflow:hidden;
      transition:transform 0.25s,box-shadow 0.25s;cursor:pointer;}
    .art-card:hover{transform:translateY(-5px);box-shadow:0 14px 40px rgba(160,47,98,0.35);}

    .art-img-wrap{position:relative;width:100%;aspect-ratio:4/3;background:rgba(122,56,112,0.2);overflow:hidden;}
    .art-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s;}
    .art-card:hover .art-img-wrap img{transform:scale(1.05);}

    /* fallback if image fails */
    .img-fallback{display:none;width:100%;height:100%;align-items:center;justify-content:center;
      flex-direction:column;gap:0.4rem;color:var(--lavender);font-size:0.85rem;font-style:italic;text-align:center;padding:1rem;}
    .img-fallback span{font-size:2.5rem;}

    .art-body{padding:1.2rem 1.4rem 1.5rem;}
    .art-title{font-family:'Cinzel Decorative',serif;font-size:0.85rem;letter-spacing:0.07em;color:var(--sand);margin-bottom:0.5rem;}
    .art-desc{font-size:0.95rem;line-height:1.65;color:#c4ae80;font-style:italic;}

    /* Lightbox */
    .lightbox{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.92);
      align-items:center;justify-content:center;cursor:zoom-out;}
    .lightbox.open{display:flex;}
    .lb-inner{position:relative;max-width:90vw;max-height:90vh;display:flex;flex-direction:column;align-items:center;gap:1rem;}
    .lb-inner img{max-width:90vw;max-height:78vh;object-fit:contain;border-radius:8px;box-shadow:0 0 60px rgba(144,114,160,0.3);}
    .lb-title{font-family:'Cinzel Decorative',serif;font-size:0.9rem;color:var(--sand);letter-spacing:0.08em;}
    .lb-desc{font-size:0.95rem;font-style:italic;color:var(--lavender);text-align:center;max-width:560px;}
    .lb-close{position:absolute;top:-2.5rem;right:0;font-size:1.8rem;color:var(--sand);background:none;border:none;cursor:pointer;line-height:1;}
    .lb-nav{display:flex;gap:1rem;margin-top:0.2rem;}
    .lb-nav button{padding:0.4rem 1.1rem;border-radius:6px;background:rgba(205,189,143,0.12);
      border:1px solid var(--plum);color:var(--sand);font-family:'Cinzel Decorative',serif;
      font-size:0.68rem;letter-spacing:0.06em;cursor:pointer;transition:background 0.2s;}
    .lb-nav button:hover{background:rgba(205,189,143,0.22);}

    footer{position:relative;z-index:1;text-align:center;padding:2rem;font-size:0.8rem;color:var(--plum);
      border-top:1px solid rgba(122,56,112,0.3);margin-top:3rem;}
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">✦ My Portfolio</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="artwork.html" class="active">Artwork</a></li>
    <li><a href="music.html">Music</a></li>
    <li><a href="animations.html">Animations</a></li>
  </ul>
</nav>

<main class="page">
  <h1 class="page-title">Artwork Gallery</h1>
  <p class="page-sub">Original pieces &amp; illustrated works</p>
  <div id="gallery-container"><p class="state-msg">Loading gallery…</p></div>
</main>

<footer><p>✦ All content belongs to me ✦</p></footer>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lb-inner">
    <button class="lb-close" id="lb-close">✕</button>
    <img id="lb-img" src="" alt="" />
    <div class="lb-title" id="lb-title"></div>
    <div class="lb-desc" id="lb-desc"></div>
    <div class="lb-nav">
      <button id="lb-prev">← Prev</button>
      <button id="lb-next">Next →</button>
    </div>
  </div>
</div>

<script>
let pieces = [];
let currentIdx = 0;

function openLightbox(idx) {
  currentIdx = idx;
  showLightboxItem();
  document.getElementById('lightbox').classList.add('open');
}
function showLightboxItem() {
  const p = pieces[currentIdx];
  document.getElementById('lb-img').src = p.image;
  document.getElementById('lb-img').alt = p.title || '';
  document.getElementById('lb-title').textContent = p.title || '';
  document.getElementById('lb-desc').textContent = p.description || '';
}
document.getElementById('lb-close').onclick = () => document.getElementById('lightbox').classList.remove('open');
document.getElementById('lightbox').addEventListener('click', e => { if(e.target===document.getElementById('lightbox')) document.getElementById('lightbox').classList.remove('open'); });
document.getElementById('lb-prev').onclick = e => { e.stopPropagation(); currentIdx=(currentIdx-1+pieces.length)%pieces.length; showLightboxItem(); };
document.getElementById('lb-next').onclick = e => { e.stopPropagation(); currentIdx=(currentIdx+1)%pieces.length; showLightboxItem(); };
document.addEventListener('keydown', e => {
  if(!document.getElementById('lightbox').classList.contains('open')) return;
  if(e.key==='ArrowLeft') { currentIdx=(currentIdx-1+pieces.length)%pieces.length; showLightboxItem(); }
  if(e.key==='ArrowRight') { currentIdx=(currentIdx+1)%pieces.length; showLightboxItem(); }
  if(e.key==='Escape') document.getElementById('lightbox').classList.remove('open');
});

function buildCard(p, idx) {
  const card = document.createElement('div');
  card.className = 'art-card';
  card.setAttribute('role','button');
  card.setAttribute('tabindex','0');
  card.setAttribute('aria-label', p.title || 'View artwork');
  card.onclick = () => openLightbox(idx);
  card.onkeydown = e => { if(e.key==='Enter'||e.key===' ') openLightbox(idx); };
  card.innerHTML = `
    <div class="art-img-wrap">
      <img src="${p.image}" alt="${p.title||''}"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
      <div class="img-fallback"><span>🖼️</span><p>Image not found</p></div>
    </div>
    <div class="art-body">
      <div class="art-title">${p.title||'Untitled'}</div>
      <div class="art-desc">${p.description||''}</div>
    </div>`;
  return card;
}

fetch('data.json')
  .then(r => { if(!r.ok) throw new Error('not found'); return r.json(); })
  .then(data => {
    const container = document.getElementById('gallery-container');
    pieces = data.artwork || [];
    if(pieces.length === 0) {
      container.innerHTML = '<p class="state-msg">No artwork yet — add images to <code>data.json</code> to get started.</p>';
      return;
    }
    const grid = document.createElement('div');
    grid.className = 'gallery';
    pieces.forEach((p, i) => grid.appendChild(buildCard(p, i)));
    container.innerHTML = '';
    container.appendChild(grid);
  })
  .catch(() => {
    document.getElementById('gallery-container').innerHTML =
      '<p class="state-msg">Could not load <strong>data.json</strong>. Make sure you\'re running the site through a local server (see README.txt).</p>';
  });
</script>
</body>
</html>
